<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Absensi Karyawan</title>

<style>

body{
font-family:Arial;
background:#f5f8ff;
text-align:center;
margin:0;
padding:0;
}

.header{
background:#1a73e8;
color:white;
padding:20px;
font-size:22px;
font-weight:bold;
}

.container{
padding:20px;
}

.clock{
font-size:26px;
margin:10px;
font-weight:bold;
}

button{
width:90%;
padding:18px;
margin:10px;
font-size:18px;
border:none;
border-radius:10px;
background:#1a73e8;
color:white;
cursor:pointer;
}

button:hover{
background:#0f5ed7;
}

video{
width:100%;
border-radius:10px;
margin-top:10px;
}

canvas{
display:none;
}

</style>
</head>

<body>

<div class="header">
Dashboard Absensi
</div>

<div class="container">

<input id="nama" placeholder="Masukkan Nama" style="width:90%;padding:12px;border-radius:8px;border:1px solid #ccc">

<div class="clock" id="clock"></div>

<button onclick="absenMasuk()">Absen Masuk</button>
<button onclick="absenPulang()">Absen Pulang</button>

<video id="camera" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<p id="status"></p>

</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage.js"></script>

<script>

// CONFIG FIREBASE
const firebaseConfig = {
apiKey: "APIKEY",
authDomain: "PROJECT.firebaseapp.com",
projectId: "PROJECTID",
storageBucket: "PROJECT.appspot.com",
messagingSenderId: "123456",
appId: "APPID"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const storage = firebase.storage();


// JAM REALTIME WIB

function updateClock(){

let now = new Date();

let jam = now.toLocaleTimeString('id-ID',{timeZone:'Asia/Jakarta'});

let tanggal = now.toLocaleDateString('id-ID',{timeZone:'Asia/Jakarta'});

document.getElementById("clock").innerHTML = tanggal+"<br>"+jam;

}

setInterval(updateClock,1000);


// AKTIFKAN KAMERA

async function startCamera(){

const stream = await navigator.mediaDevices.getUserMedia({
video:true
});

document.getElementById("camera").srcObject = stream;

}

startCamera();


// AMBIL FOTO

function takePhoto(){

let video = document.getElementById("camera");
let canvas = document.getElementById("canvas");

canvas.width = video.videoWidth;
canvas.height = video.videoHeight;

canvas.getContext("2d").drawImage(video,0,0);

return canvas.toDataURL("image/png");

}


// AMBIL GPS

function getLocation(){

return new Promise((resolve,reject)=>{

navigator.geolocation.getCurrentPosition(
pos=>resolve(pos),
err=>reject(err),
{enableHighAccuracy:true}

);

});

}


// SIMPAN DATA

async function saveData(status){

let nama = document.getElementById("nama").value;

if(nama==""){
alert("Masukkan nama terlebih dahulu");
return;
}

try{

let lokasi = await getLocation();

let lat = lokasi.coords.latitude;
let lng = lokasi.coords.longitude;

let foto = takePhoto();

let now = new Date();
let jam = now.getHours();
let menit = now.getMinutes();

let waktu = jam+":"+menit;

await db.collection("absensi").add({

nama:nama,
tanggal:new Date().toLocaleDateString('id-ID',{timeZone:'Asia/Jakarta'}),
jam:waktu,
status:status,
latitude:lat,
longitude:lng,
foto:foto

});

document.getElementById("status").innerHTML="Absensi berhasil";

}catch(e){

alert("Aktifkan GPS untuk melakukan absensi");

}

}


// ABSEN MASUK

function absenMasuk(){

let now = new Date();

let jam = now.getHours();
let menit = now.getMinutes();

let total = jam*60+menit;

let start = 7*60;
let end = 7*60+30;

if(total < start){

alert("Belum waktunya absensi");

return;

}

if(total > end){

saveData("Terlambat");

}else{

saveData("Hadir");

}

}


// ABSEN PULANG

function absenPulang(){

let now = new Date();

let jam = now.getHours();
let menit = now.getMinutes();

let total = jam*60+menit;

let start = 15*60+30;
let end = 17*60+30;

if(total < start){

alert("Belum waktunya absensi pulang");

return;

}

if(total > end){

alert("Waktu absensi pulang telah berakhir");

return;

}

saveData("Pulang");

}

</script>

</body>
</html>
