<!doctype html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Absensi Karyawan</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

body{
font-family:'Plus Jakarta Sans',sans-serif;
background:#f0f5ff;
}

.page{display:none}
.page.active{display:block}

</style>

</head>

<body class="text-slate-800">

<div class="max-w-xl mx-auto p-4">

<!-- NAVBAR -->

<div class="bg-blue-900 text-white rounded-xl p-4 flex justify-between items-center">

<div class="flex gap-3 items-center">
<i data-lucide="clipboard-check"></i>
<h1 class="font-bold">Absensi Karyawan</h1>
</div>

<div class="flex gap-2">

<button onclick="showPage('dashboard')" class="bg-white/20 px-3 py-1 rounded text-sm">
Dashboard
</button>

<button onclick="showPage('admin')" class="bg-white/20 px-3 py-1 rounded text-sm">
Admin
</button>

</div>

</div>


<!-- DASHBOARD -->

<div id="page-dashboard" class="page active mt-6">

<div class="bg-white rounded-xl shadow p-6 text-center">

<div id="tanggal" class="text-sm text-gray-500"></div>

<div id="jam" class="text-5xl font-bold text-blue-700 mt-2">
--:--:--
</div>

<div class="text-xs text-gray-400 mt-1">
Waktu Indonesia Barat
</div>

</div>


<div class="bg-white rounded-xl shadow p-5 mt-4">

<label class="text-sm font-semibold">Pilih Pegawai</label>

<select id="pegawai" class="w-full border rounded-lg p-3 mt-2">
<option value="">-- Pilih Pegawai --</option>
</select>

</div>


<div class="grid grid-cols-2 gap-3 mt-4">

<button onclick="startAbsensi('masuk')" class="bg-blue-600 text-white rounded-xl p-6 text-center">

<i data-lucide="log-in" class="mx-auto mb-2"></i>

<div class="font-bold">Absen Masuk</div>

<div class="text-xs opacity-70">07:00 - 07:30</div>

</button>

<button onclick="startAbsensi('pulang')" class="bg-emerald-600 text-white rounded-xl p-6 text-center">

<i data-lucide="log-out" class="mx-auto mb-2"></i>

<div class="font-bold">Absen Pulang</div>

<div class="text-xs opacity-70">15:30 - 17:30</div>

</button>

</div>

</div>



<!-- PAGE ABSENSI -->

<div id="page-absensi" class="page mt-6">

<div class="flex items-center gap-3 mb-4">

<button onclick="cancelAbsensi()" class="bg-white border p-2 rounded-lg">
<i data-lucide="arrow-left"></i>
</button>

<div>

<div id="judulAbsensi" class="font-bold text-lg"></div>
<div id="namaPegawai" class="text-sm text-gray-500"></div>

</div>

</div>


<div class="bg-white rounded-xl shadow overflow-hidden">

<video id="camera" autoplay playsinline class="w-full h-64 object-cover"></video>

<canvas id="canvas" class="hidden"></canvas>

<img id="previewFoto" class="hidden w-full h-64 object-cover">

</div>


<div class="flex gap-2 mt-3">

<button onclick="capture()" id="btnFoto" class="flex-1 bg-blue-600 text-white p-3 rounded-lg">
Ambil Foto
</button>

<button onclick="ulangFoto()" id="btnUlang" class="hidden flex-1 bg-gray-200 p-3 rounded-lg">
Ulang
</button>

</div>



<div class="bg-white rounded-xl shadow p-4 mt-4">

<div class="font-semibold text-sm mb-1">Lokasi</div>

<div id="lokasi" class="text-sm text-gray-500">

Mengambil GPS...

</div>

</div>



<button onclick="submitAbsensi()" id="btnSubmit" disabled class="w-full bg-blue-700 text-white p-4 rounded-xl mt-4 font-bold">

Kirim Absensi

</button>

</div>



<!-- ADMIN LOGIN -->

<div id="page-admin" class="page mt-6">

<div class="bg-white rounded-xl shadow p-6 max-w-md mx-auto">

<h2 class="font-bold text-lg mb-3">Login Admin</h2>

<input type="password" id="adminPass" placeholder="Password" class="border rounded-lg w-full p-3">

<button onclick="adminLogin()" class="w-full bg-blue-700 text-white p-3 rounded-lg mt-3">
Login
</button>

</div>

</div>



<!-- ADMIN PANEL -->

<div id="page-admin-panel" class="page mt-6">

<div class="flex justify-between items-center mb-3">

<h2 class="font-bold text-lg">Data Absensi</h2>

<button onclick="downloadCSV()" class="bg-emerald-600 text-white px-3 py-2 rounded-lg text-sm">
Download CSV
</button>

</div>


<div class="bg-white rounded-xl shadow overflow-auto">

<table class="w-full text-sm">

<thead class="bg-blue-900 text-white">

<tr>

<th class="p-2">Nama</th>
<th class="p-2">Tanggal</th>
<th class="p-2">Jam</th>
<th class="p-2">Status</th>
<th class="p-2">Lokasi</th>
<th class="p-2">Foto</th>

</tr>

</thead>

<tbody id="dataAbsensi">

</tbody>

</table>

</div>

</div>


</div>


<script src="config.js"></script>
<script src="employees.js"></script>
<script src="app.js"></script>

<script>

function updateClock(){

let now = new Date()

document.getElementById("jam").innerText =
now.toLocaleTimeString("id-ID")

document.getElementById("tanggal").innerText =
now.toLocaleDateString("id-ID")

}

setInterval(updateClock,1000)

updateClock()

function showPage(page){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))

document.getElementById("page-"+page).classList.add("active")

}

lucide.createIcons()

</script>

</body>
</html>
