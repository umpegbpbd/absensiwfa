async function loadDataFromGithub() {
  try {
    const response = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
      headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
    });
    const data = await response.json();
    
    if (data.files && data.files['absensi.json']) {
      const content = data.files['absensi.json'].content;
      allRecords = JSON.parse(content);
      renderRiwayat();
    }
  } catch (e) {
    console.error('Gagal load dari GitHub:', e);
  }
}

async function saveToGithub() {
  try {
    const response = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
      method: 'PATCH',
      headers: {
        'Authorization': `token ${GITHUB_TOKEN}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        files: {
          'absensi.json': {
            content: JSON.stringify(allRecords, null, 2)
          }
        }
      })
    });
    return response.ok;
  } catch (e) {
    console.error('Gagal simpan ke GitHub:', e);
    return false;
  }
}

function updateClock() {
  const now = getWIBDate();
  const days = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
  const months = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
  
  const dateStr = `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]}`;
  const timeStr = padZ(now.getHours()) + ':' + padZ(now.getMinutes()) + ':' + padZ(now.getSeconds());

  const dateEl = document.getElementById('clock-date');
  const timeEl = document.getElementById('clock-time');
  if (dateEl) dateEl.textContent = dateStr;
  if (timeEl) timeEl.textContent = timeStr;
  updateStatusInfo(now);
}

function getWIBDate() {
  const now = new Date();
  const utc = now.getTime() + now.getTimezoneOffset() * 60000;
  return new Date(utc + 7 * 3600000);
}

function padZ(n) { return n.toString().padStart(2, '0'); }

function updateStatusInfo(now) {
  const h = now.getHours(), m = now.getMinutes();
  const mins = h * 60 + m;
  const el = document.getElementById('status-text');
  const btnM = document.getElementById('btn-masuk');
  const btnP = document.getElementById('btn-pulang');

  if (mins < 420) {
    el.innerHTML = '⏳ Belum jam absen masuk';
    btnM.disabled = true; btnM.style.animation = 'none';
    btnP.disabled = true;
  } else if (mins <= 450) {
    el.innerHTML = '✅ Waktu absen masuk';
    btnM.disabled = false; btnM.style.animation = '';
    btnP.disabled = true;
  } else if (mins <= 540) {
    el.innerHTML = '⚠️ Terlambat!';
    btnM.disabled = false; btnM.style.animation = '';
    btnP.disabled = true;
  } else if (mins < 930) {
    el.innerHTML = '🕐 Tunggu jam pulang';
    btnM.disabled = true; btnM.style.animation = 'none';
    btnP.disabled = true;
  } else if (mins <= 1050) {
    el.innerHTML = '🏠 Waktu absen pulang';
    btnM.disabled = true; btnM.style.animation = 'none';
    btnP.disabled = false;
  } else {
    el.innerHTML = '❌ Jam absen telah berakhir';
    btnM.disabled = true; btnM.style.animation = 'none';
    btnP.disabled = true;
  }
}

function switchTab(tab) {
  ['absensi','riwayat','admin'].forEach(t => {
    const panel = document.getElementById('panel-' + t);
    const tabBtn = document.getElementById('tab-' + t);
    if (t === tab) {
      panel.classList.remove('hidden');
      tabBtn.classList.add('tab-active');
      tabBtn.classList.remove('bg-white/30', 'text-white');
    } else {
      panel.classList.add('hidden');
      tabBtn.classList.remove('tab-active');
      tabBtn.classList.add('bg-white/30', 'text-white');
    }
  });
  if (tab === 'riwayat') renderRiwayat();
  lucide.createIcons();
}

function showToast(msg, type = 'info') {
  const container = document.getElementById('toast-container');
  const colors = { success:'bg-green-500', error:'bg-red-500', info:'bg-primary-600', warning:'bg-amber-500' };
  const icons = { success:'check-circle', error:'alert-circle', info:'info', warning:'alert-triangle' };
  const toast = document.createElement('div');
  toast.className = `${colors[type]} text-white px-4 py-2 rounded-lg shadow-lg flex items-center gap-2 text-xs font-600 toast-enter`;
  toast.innerHTML = `<i data-lucide="${icons[type]}" class="w-4 h-4"></i><span>${msg}</span>`;
  container.appendChild(toast);
  lucide.createIcons();
  setTimeout(() => {
    toast.classList.remove('toast-enter');
    toast.classList.add('toast-exit');
    setTimeout(() => toast.remove(), 300);
  }, 3500);
}

function initGPS() {
  if (!navigator.geolocation) {
    updateGPSUI(false, 'Tidak tersedia');
    return;
  }
  navigator.geolocation.watchPosition(
    (pos) => {
      if (pos.coords.accuracy && pos.coords.accuracy < 1) {
        updateGPSUI(false, 'Fake GPS?');
        gpsReady = false;
        currentLocation = { lat: null, lng: null };
        return;
      }
      currentLocation.lat = pos.coords.latitude;
      currentLocation.lng = pos.coords.longitude;
      gpsReady = true;
      updateGPSUI(true, 'Siap');
    },
    () => {
      gpsReady = false;
      updateGPSUI(false, 'Aktifkan GPS');
    },
    { enableHighAccuracy: true, maximumAge: 10000, timeout: 10000 }
  );
}

function updateGPSUI(ok, text) {
  const indicator = document.getElementById('gps-indicator');
  const textEl = document.getElementById('gps-text');
  indicator.className = 'w-2 h-2 rounded-full ' + (ok ? 'bg-green-500' : 'bg-red-400');
  textEl.textContent = text;
  textEl.className = 'text-xs ' + (ok ? 'text-green-600' : 'text-red-500');
}

function startAbsensi(type) {
  const nama = document.getElementById('select-nama').value;
  if (!nama) { showToast('Pilih nama dulu', 'warning'); return; }
  if (!gpsReady) { showToast('Aktifkan GPS', 'error'); return; }

  const today = formatDate(getWIBDate());
  const existing = allRecords.find(r => r.nama === nama && r.tanggal === today && r.tipe === type);
  if (existing) {
    showToast(`Sudah absen ${type} hari ini`, 'warning');
    return;
  }

  pendingAbsensiType = type;
  openCamera();
}

async function openCamera() {
  const modal = document.getElementById('camera-modal');
  const video = document.getElementById('camera-video');
  const preview = document.getElementById('camera-preview');
  const btnCapture = document.getElementById('btn-capture');
  const btnRetake = document.getElementById('btn-retake');
  const btnConfirm = document.getElementById('btn-confirm');
  const title = document.getElementById('camera-title');

  title.textContent = pendingAbsensiType === 'masuk' ? 'Foto Masuk' : 'Foto Pulang';
  modal.classList.remove('hidden');
  preview.classList.add('hidden');
  video.classList.remove('hidden');
  btnCapture.classList.remove('hidden');
  btnRetake.classList.add('hidden');
  btnConfirm.classList.add('hidden');
  photoCaptured = false;

  try {
    currentStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
      audio: false
    });
    video.srcObject = currentStream;
  } catch (e) {
    showToast('Tidak bisa akses kamera', 'error');
    closeCamera();
  }
}

function capturePhoto() {
  const video = document.getElementById('camera-video');
  const canvas = document.getElementById('camera-canvas');
  const preview = document.getElementById('camera-preview');
  const flash = document.getElementById('camera-flash-overlay');

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext('2d');
  ctx.translate(canvas.width, 0);
  ctx.scale(-1, 1);
  ctx.drawImage(video, 0, 0);

  preview.src = canvas.toDataURL('image/jpeg', 0.7);
  preview.classList.remove('hidden');
  video.classList.add('hidden');

  flash.classList.add('camera-flash');
  flash.style.opacity = '1';
  setTimeout(() => { flash.style.opacity = '0'; flash.classList.remove('camera-flash'); }, 300);

  document.getElementById('btn-capture').classList.add('hidden');
  document.getElementById('btn-retake').classList.remove('hidden');
  document.getElementById('btn-confirm').classList.remove('hidden');
  photoCaptured = true;
  lucide.createIcons();
}

function retakePhoto() {
  const video = document.getElementById('camera-video');
  const preview = document.getElementById('camera-preview');
  preview.classList.add('hidden');
  video.classList.remove('hidden');
  document.getElementById('btn-capture').classList.remove('hidden');
  document.getElementById('btn-retake').classList.add('hidden');
  document.getElementById('btn-confirm').classList.add('hidden');
  photoCaptured = false;
  lucide.createIcons();
}

async function confirmPhoto() {
  if (!photoCaptured) return;
  closeCamera();
  await saveAbsensi();
}

function closeCamera() {
  if (currentStream) {
    currentStream.getTracks().forEach(t => t.stop());
    currentStream = null;
  }
  document.getElementById('camera-modal').classList.add('hidden');
}

async function saveAbsensi() {
  const loading = document.getElementById('loading-overlay');
  loading.classList.remove('hidden');

  const now = getWIBDate();
  const nama = document.getElementById('select-nama').value;
  const jam = padZ(now.getHours()) + ':' + padZ(now.getMinutes()) + ':' + padZ(now.getSeconds());
  const tanggal = formatDate(now);

  let status;
  if (pendingAbsensiType === 'masuk') {
    const mins = now.getHours() * 60 + now.getMinutes();
    status = mins <= 450 ? 'Hadir' : 'Terlambat';
  } else {
    status = 'Pulang';
  }

  if (allRecords.length >= 999) {
    loading.classList.add('hidden');
    showToast('Batas data tercapai', 'error');
    return;
  }

  const record = {
    nama,
    tanggal,
    jam,
    status,
    tipe: pendingAbsensiType,
    latitude: currentLocation.lat ? currentLocation.lat.toFixed(6) : '',
    longitude: currentLocation.lng ? currentLocation.lng.toFixed(6) : '',
    foto_captured: 'Ya',
    timestamp: Date.now()
  };

  allRecords.push(record);
  const saved = await saveToGithub();
  loading.classList.add('hidden');

  if (saved) {
    const emoji = status === 'Hadir' ? '✅' : status === 'Terlambat' ? '⚠️' : '🏠';
    showToast(`${emoji} Absen ${pendingAbsensiType} - ${status}`, 'success');
    renderRiwayat();
  } else {
    allRecords.pop();
    showToast('Gagal menyimpan ke GitHub', 'error');
  }
}

function formatDate(d) {
  return padZ(d.getDate()) + '/' + padZ(d.getMonth()+1) + '/' + d.getFullYear();
}

function renderRiwayat() {
  const filterNama = document.getElementById('filter-nama-riwayat').value;
  const list = document.getElementById('riwayat-list');
  const empty = document.getElementById('riwayat-empty');

  const filtered = allRecords
    .filter(r => !filterNama || r.nama === filterNama)
    .sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

  if (filtered.length === 0) {
    list.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }

  empty.classList.add('hidden');
  list.innerHTML = '';
  filtered.forEach(r => {
    const statusClass = r.status === 'Hadir' ? 'status-hadir' : r.status === 'Terlambat' ? 'status-terlambat' : 'status-pulang';
    const card = document.createElement('div');
    card.className = 'bg-white rounded-lg p-2 shadow-sm border border-gray-100 text-xs';
    card.innerHTML = `
      <div class="flex justify-between items-center mb-1">
       <span class="text-gray-500">${r.tanggal}</span>
       <span class="${statusClass} text-white px-2 py-1 rounded-full font-600" style="font-size:10px">${r.status}</span>
      </div>
      <div class="font-600 text-gray-800">${r.nama}</div>
      <div class="text-gray-500">⏰ ${r.jam}</div>
    `;
    list.appendChild(card);
  });
  lucide.createIcons();
}

function loginAdmin() {
  const pin = document.getElementById('admin-pin').value;
  if (pin === ADMIN_PIN) {
    adminLoggedIn = true;
    document.getElementById('admin-login').classList.add('hidden');
    document.getElementById('admin-panel-content').classList.remove('hidden');
    renderAdminData();
    showToast('Admin login berhasil', 'success');
  } else {
    showToast('PIN salah', 'error');
  }
}

function logoutAdmin() {
  adminLoggedIn = false;
  document.getElementById('admin-login').classList.remove('hidden');
  document.getElementById('admin-panel-content').classList.add('hidden');
  document.getElementById('admin-pin').value = '';
}

function renderAdminData() {
  const filterDate = document.getElementById('admin-filter-date').value;
  let filtered = [...allRecords];

  if (filterDate) {
    const d = new Date(filterDate);
    const ds = padZ(d.getDate()) + '/' + padZ(d.getMonth()+1) + '/' + d.getFullYear();
    filtered = filtered.filter(r => r.tanggal === ds);
  }

  filtered.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

  const hadir = filtered.filter(r => r.status === 'Hadir').length;
  const terlambat = filtered.filter(r => r.status === 'Terlambat').length;
  const pulang = filtered.filter(r => r.status === 'Pulang').length;
  document.getElementById('stat-hadir').textContent = hadir;
  document.getElementById('stat-terlambat').textContent = terlambat;
  document.getElementById('stat-pulang').textContent = pulang;

  const list = document.getElementById('admin-data-list');
  list.innerHTML = '';
  filtered.forEach(r => {
    const statusClass = r.status === 'Hadir' ? 'status-hadir' : r.status === 'Terlambat' ? 'status-terlambat' : 'status-pulang';
    const card = document.createElement('div');
    card.className = 'bg-white rounded-lg p-2 shadow-sm border border-gray-100 text-xs';
    card.innerHTML = `
      <div class="flex justify-between items-center mb-1">
       <span class="text-gray-500">${r.tanggal}</span>
       <span class="${statusClass} text-white px-2 py-1 rounded-full font-600" style="font-size:10px">${r.status}</span>
      </div>
      <div class="font-600 text-gray-800">${r.nama}</div>
      <div class="text-gray-500">⏰ ${r.jam}</div>
    `;
    list.appendChild(card);
  });
}

function exportCSV() {
  const filterDate = document.getElementById('admin-filter-date').value;
  let filtered = [...allRecords];
  if (filterDate) {
    const d = new Date(filterDate);
    const ds = padZ(d.getDate()) + '/' + padZ(d.getMonth()+1) + '/' + d.getFullYear();
    filtered = filtered.filter(r => r.tanggal === ds);
  }

  if (filtered.length === 0) {
    showToast('Tidak ada data', 'warning');
    return;
  }

  const headers = ['Nama', 'Tanggal', 'Jam', 'Status'];
  const rows = filtered.map(r => [`"${r.nama}"`, r.tanggal, r.jam, r.status]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `absensi_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Export sukses', 'success');
}
