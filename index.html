<video id="camera" autoplay playsinline></video>

</div>

<script>

let latitude=0
let longitude=0

function updateClock(){

let now=new Date()

let options={timeZone:"Asia/Jakarta"}

let time=now.toLocaleTimeString("id-ID",options)
let date=now.toLocaleDateString("id-ID",options)

document.getElementById("jam").innerHTML=time
document.getElementById("tanggal").innerHTML=date

}

setInterval(updateClock,1000)


navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
document.getElementById("camera").srcObject=stream
})


navigator.geolocation.getCurrentPosition(function(pos){

latitude=pos.coords.latitude
longitude=pos.coords.longitude

document.getElementById("gps").innerHTML="GPS aktif"

},
function(){

document.getElementById("gps").innerHTML="Akses lokasi ditolak. Aktifkan GPS."

})

function ambilFoto(){

let video=document.getElementById("camera")

let canvas=document.createElement("canvas")

canvas.width=video.videoWidth
canvas.height=video.videoHeight

let ctx=canvas.getContext("2d")

ctx.drawImage(video,0,0)

return canvas.toDataURL("image/png")

}

function absenMasuk(){

let nama=document.getElementById("nama").value

if(nama==""){

alert("Pilih nama terlebih dahulu")
return

}

let now=new Date()

let jam=now.getHours()
let menit=now.getMinutes()

let total=jam*60+menit

let start=7*60
let end=7*60+30

if(total<start){

alert("Belum waktunya absensi")

return

}

let status="Hadir"

if(total>end){

status="Terlambat"

}

let foto=ambilFoto()

console.log({
nama,
status,
foto,
latitude,
longitude
})

document.getElementById("status").innerHTML="Absensi masuk tercatat ("+status+")"

alert("Absensi berhasil")

}

function absenPulang(){

let nama=document.getElementById("nama").value

if(nama==""){

alert("Pilih nama terlebih dahulu")
return

}

let now=new Date()

let jam=now.getHours()
let menit=now.getMinutes()

let total=jam*60+menit

let start=15*60+30
let end=17*60+30

if(total<start){

alert("Belum waktunya absensi pulang")
return

}

if(total>end){

alert("Waktu absensi pulang telah berakhir")
return

}

let foto=ambilFoto()

console.log({
nama,
status:"Pulang",
foto,
latitude,
longitude
})

document.getElementById("status").innerHTML="Absensi pulang tercatat"

alert("Absensi pulang berhasil")

}

</script>
