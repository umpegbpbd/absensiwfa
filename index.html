<!doctype html>
<html lang="id" class="h-full">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Absensi WFA</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Icons -->
<script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
font-family:'Plus Jakarta Sans',sans-serif;
box-sizing:border-box;
}

body{
background:#f0f5ff;
margin:0;
}

/* page */
.page{display:none}
.page.active{display:block}

/* camera */
#cameraPreview{
transform:scaleX(-1);
border-radius:12px;
}

/* photo */
.photo-thumb{
width:40px;
height:40px;
border-radius:8px;
object-fit:cover;
cursor:pointer;
}

/* toast */
.toast{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#059669;
color:white;
padding:12px 20px;
border-radius:10px;
font-size:14px;
z-index:9999;
display:none;
}

</style>

</head>

<body class="h-full">

<div class="max-w-2xl mx-auto p-4">

<!-- NAVBAR -->

<div class="bg-blue-900 text-white rounded-xl p-4 flex justify-between items-center">

<div class="flex items-center gap-2">
<i data-lucide="clipboard-check"></i>
<span class="font-bold">Absensi Karyawan</span>
</div>

<div class="flex gap-2">

<button onclick="showPage('dashboard')" class="bg-white/20 px-3 py-1 rounded text-sm">
Dashboard
</button>

<button onclick="showPage('admin')" class="bg-white/20 px-3 py-1 rounded text-sm">
Admin
</button>

</div>

</div>

<!-- DASHBOARD -->

<div id="page-dashboard" class="page active mt-5">

<div class="bg-white rounded-xl shadow p-6 text-center">

<div id="currentDate" class="text-sm text-gray-500"></div>

<div id="clockDisplay" class="text-5xl font-bold text-blue-700 mt-2">
--:--:--
</div>

<div class="text-xs text-gray-400 mt-1">
Waktu Indonesia Barat
</div>

</div>

<div class="bg-white rounded-xl shadow p-4 mt-4">

<label class="text-sm font-semibold">
Pilih Pegawai
</label>

<select id="employeeSelect" class="w-full border rounded-lg p-3 mt-2">
<option value="">-- Pilih Pegawai --</option>
</select>

</div>

<div class="grid grid-cols-2 gap-3 mt-4">

<button onclick="startAbsensi('masuk')" class="bg-blue-600 text-white rounded-xl p-6">

<div class="font-bold">
Absen Masuk
</div>

<div class="text-xs opacity-80">
07:00 - 07:30
</div>

</button>

<button onclick="startAbsensi('pulang')" class="bg-emerald-600 text-white rounded-xl p-6">

<div class="font-bold">
Absen Pulang
</div>

<div class="text-xs opacity-80">
15:30 - 17:30
</div>

</button>

</div>

</div>

<!-- PAGE ABSENSI -->

<div id="page-absensi" class="page mt-5">

<button onclick="cancelAbsensi()" class="mb-3 bg-white border px-3 py-2 rounded">
Kembali
</button>

<video id="cameraPreview" autoplay playsinline class="w-full h-64 bg-black"></video>

<canvas id="cameraCanvas" class="hidden"></canvas>

<img id="capturedPhoto" class="hidden w-full h-64 object-cover">

<div class="flex gap-2 mt-3">

<button onclick="capturePhoto()" id="btnCapture" class="flex-1 bg-blue-600 text-white p-3 rounded">
Ambil Foto
</button>

<button onclick="retakePhoto()" id="btnRetake" class="hidden flex-1 bg-gray-200 p-3 rounded">
Ulang
</button>

</div>

<div id="locationInfo" class="text-sm text-gray-500 mt-3">
Mengambil GPS...
</div>

<button onclick="submitAbsensi()" id="btnSubmitAbsensi" class="w-full bg-blue-700 text-white p-4 rounded-xl mt-4">
Kirim Absensi
</button>

</div>

<!-- ADMIN LOGIN -->

<div id="page-admin" class="page mt-5">

<input type="password" id="adminPass" placeholder="Password Admin" class="border p-3 w-full rounded">

<button onclick="adminLogin()" class="bg-blue-700 text-white p-3 w-full mt-2 rounded">
Login
</button>

<div id="adminPanel" class="hidden mt-5">

<button onclick="loadAdminData()" class="bg-blue-600 text-white px-3 py-2 rounded text-sm">
Refresh Data
</button>

<button onclick="downloadCSV()" class="bg-emerald-600 text-white px-3 py-2 rounded text-sm">
Download CSV
</button>

<table class="w-full mt-4 text-sm">

<thead class="bg-blue-900 text-white">
<tr>
<th class="p-2">Nama</th>
<th class="p-2">Tanggal</th>
<th class="p-2">Jam</th>
<th class="p-2">Status</th>
<th class="p-2">Foto</th>
</tr>
</thead>

<tbody id="adminTableBody">

<tr>
<td colspan="5" class="text-center p-4 text-gray-400">
Belum ada data
</td>
</tr>

</tbody>

</table>

</div>

</div>

</div>

<!-- JS FILES -->

<script src="config.js"></script>
<script src="employees.js"></script>
<script src="app.js"></script>

<script>

function showPage(page){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))

document.getElementById("page-"+page).classList.add("active")

}

lucide.createIcons()

</script>

</body>
</html>
