<script>

let latitude=0
let longitude=0
let alamat=""

function updateClock(){

let now=new Date()

let options={timeZone:"Asia/Jakarta"}

let jam=now.toLocaleTimeString("id-ID",options)
let tanggal=now.toLocaleDateString("id-ID",options)

document.getElementById("jam").innerHTML=jam
document.getElementById("tanggal").innerHTML=tanggal

}

setInterval(updateClock,1000)



navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
document.getElementById("camera").srcObject=stream
})



function ambilLokasi(){

navigator.geolocation.getCurrentPosition(async function(pos){

latitude=pos.coords.latitude
longitude=pos.coords.longitude

let url=`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`

let res=await fetch(url)
let data=await res.json()

let a=data.address

let kab=a.county||""
let kec=a.city_district||a.suburb||""
let desa=a.village||a.town||""

alamat=kab+", "+kec+", "+desa

document.getElementById("gps").innerHTML=
"Kabupaten : "+kab+"<br>"+
"Kecamatan : "+kec+"<br>"+
"Desa : "+desa

},
function(){

document.getElementById("gps").innerHTML=
"Akses lokasi ditolak. Aktifkan GPS."

},
{enableHighAccuracy:true}

)

}

ambilLokasi()



function ambilFoto(){

let video=document.getElementById("camera")

let canvas=document.createElement("canvas")

canvas.width=video.videoWidth
canvas.height=video.videoHeight

let ctx=canvas.getContext("2d")

ctx.drawImage(video,0,0)

return canvas.toDataURL("image/png")

}



function absenMasuk(){

let nama=document.getElementById("nama").value

if(nama==""){
alert("Pilih nama terlebih dahulu")
return
}

let now=new Date()

let jam=now.getHours()
let menit=now.getMinutes()

let total=jam*60+menit

let start=7*60
let end=7*60+30

if(total<start){
alert("Belum waktunya absensi")
return
}

let status="Hadir"

if(total>end){
status="Terlambat"
}

let foto=ambilFoto()

console.log({
nama,
status,
latitude,
longitude,
alamat,
foto
})

document.getElementById("status").innerHTML=
"Absensi masuk tercatat ("+status+")"

alert("Absensi berhasil")

}



function absenPulang(){

let nama=document.getElementById("nama").value

if(nama==""){
alert("Pilih nama terlebih dahulu")
return
}

let now=new Date()

let jam=now.getHours()
let menit=now.getMinutes()

let total=jam*60+menit

let start=15*60+30
let end=17*60+30

if(total<start){
alert("Belum waktunya absensi pulang")
return
}

if(total>end){
alert("Waktu absensi pulang telah berakhir")
return
}

let foto=ambilFoto()

console.log({
nama,
status:"Pulang",
latitude,
longitude,
alamat,
foto
})

document.getElementById("status").innerHTML=
"Absensi pulang tercatat"

alert("Absensi pulang berhasil")

}

</script>
