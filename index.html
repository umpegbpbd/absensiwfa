<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Absensi WFA</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

body{
font-family:'Plus Jakarta Sans',sans-serif;
background:linear-gradient(135deg,#1e3a5f,#2563eb,#60a5fa);
min-height:100vh;
}

.card{
background:rgba(255,255,255,0.9);
border-radius:16px;
padding:20px;
margin-bottom:16px;
}

</style>

</head>

<body class="p-4">

<div class="max-w-md mx-auto">

<h1 class="text-white text-2xl font-bold text-center mb-4">
Absensi WFA
</h1>

<div class="card">

<p id="clock" class="text-xl font-bold"></p>

</div>

<div class="card">

<select id="nama" class="w-full border p-2 rounded mb-3">

<option value="">-- Pilih Nama --</option>

<option>AGUS SUGHULIN</option>
<option>SUDARSONO</option>
<option>DWIANA HANDAYANI,SE</option>
<option>RIZAL RIZKIANTO, A.Md</option>

</select>

<button onclick="absen('masuk')" class="w-full bg-green-500 text-white p-3 rounded mb-2">
Absen Masuk
</button>

<button onclick="absen('pulang')" class="w-full bg-indigo-500 text-white p-3 rounded">
Absen Pulang
</button>

</div>

<div class="card">

<h2 class="font-bold mb-2">Riwayat</h2>

<div id="records"></div>

</div>

</div>

<script>

let githubToken = localStorage.getItem("githubToken") || ""
let gistId = localStorage.getItem("gistId") || ""

let allRecords=[]

function clock(){

let now=new Date()

document.getElementById("clock").innerText=
now.toLocaleString("id-ID")

}

setInterval(clock,1000)

clock()

function render(){

let html=""

allRecords
.sort((a,b)=> new Date(b.created_at)-new Date(a.created_at))
.forEach(r=>{

html+=`
<div class="border p-2 rounded mb-2">

<b>${r.nama}</b><br>

${r.tanggal} ${r.jam}<br>

Status : ${r.status}

</div>
`

})

document.getElementById("records").innerHTML=html

}

async function loadFromGist(){

if(!githubToken||!gistId)return

try{

let res=await fetch(`https://api.github.com/gists/${gistId}`,{

headers:{
Authorization:`token ${githubToken}`
}

})

let gist=await res.json()

let content=gist.files["absensi-data.json"].content

let data=JSON.parse(content)

allRecords=data.data||[]

render()

console.log("loaded",allRecords.length)

}catch(e){

console.log(e)

}

}

async function syncToGist(){

if(!githubToken||!gistId)return

let payload={

files:{
"absensi-data.json":{
content:JSON.stringify({

last_sync:new Date().toISOString(),

total_records:allRecords.length,

perusahaan:"BPBD KAB TRENGGALEK",

data:allRecords

},null,2)
}
}

}

await fetch(`https://api.github.com/gists/${gistId}`,{

method:"PATCH",

headers:{
Authorization:`token ${githubToken}`,
"Content-Type":"application/json"
},

body:JSON.stringify(payload)

})

}

function pad(n){

return String(n).padStart(2,"0")

}

function today(){

let d=new Date()

return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())

}

function time(){

let d=new Date()

return pad(d.getHours())+":"+pad(d.getMinutes())+":"+pad(d.getSeconds())

}

async function absen(type){

let nama=document.getElementById("nama").value

if(!nama){

alert("Pilih nama dulu")

return

}

let status=""

if(type=="masuk"){

let jam=new Date().getHours()

status= jam>7 ? "Terlambat":"Hadir"

}else{

status="Pulang"

}

let record={

nama:nama,

tanggal:today(),

jam:time(),

status:status,

tipe:type,

created_at:new Date().toISOString()

}

allRecords.push(record)

render()

await syncToGist()

}

setInterval(loadFromGist,5000)

loadFromGist()

</script>

</body>
</html>
