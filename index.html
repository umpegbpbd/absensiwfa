<!doctype html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Absensi WFA</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Plus Jakarta Sans',sans-serif;
background:#f0f5ff;
}

.page{display:none}
.page.active{display:block}

#cameraPreview{
transform:scaleX(-1);
border-radius:12px;
}

.photo-thumb{
width:40px;
height:40px;
border-radius:8px;
object-fit:cover;
}

</style>

</head>

<body>

<div class="max-w-2xl mx-auto p-4">

<div class="bg-blue-900 text-white rounded-xl p-4 flex justify-between">

<div class="font-bold">Absensi WFA</div>

<div class="space-x-2">

<button onclick="showPage('dashboard')" class="bg-white/20 px-3 py-1 rounded text-sm">
Dashboard
</button>

<button onclick="showPage('admin')" class="bg-white/20 px-3 py-1 rounded text-sm">
Admin
</button>

</div>

</div>

<!-- DASHBOARD -->

<div id="page-dashboard" class="page active mt-4">

<div class="bg-white rounded-xl p-6 text-center shadow">

<div id="currentDate" class="text-sm text-gray-500"></div>

<div id="clockDisplay" class="text-5xl font-bold text-blue-700 mt-2">--:--:--</div>

</div>

<div class="bg-white rounded-xl p-4 mt-4 shadow">

<label class="font-semibold text-sm">Pilih Pegawai</label>

<select id="employeeSelect" class="w-full border rounded-lg p-3 mt-2">
<option value="">-- Pilih Pegawai --</option>
</select>

</div>

<div class="grid grid-cols-2 gap-3 mt-4">

<button onclick="startAbsensi('masuk')" class="bg-blue-600 text-white p-6 rounded-xl">
Absen Masuk
</button>

<button onclick="startAbsensi('pulang')" class="bg-green-600 text-white p-6 rounded-xl">
Absen Pulang
</button>

</div>

</div>

<!-- ABSENSI -->

<div id="page-absensi" class="page mt-5">

<button onclick="cancelAbsensi()" class="mb-3 border px-3 py-2 rounded">
Kembali
</button>

<video id="cameraPreview" autoplay playsinline class="w-full h-64 bg-black"></video>

<canvas id="cameraCanvas" class="hidden"></canvas>

<img id="capturedPhoto" class="hidden w-full h-64 object-cover">

<div class="flex gap-2 mt-3">

<button id="btnCapture" onclick="capturePhoto()" class="flex-1 bg-blue-600 text-white p-3 rounded">
Ambil Foto
</button>

<button id="btnRetake" onclick="retakePhoto()" class="hidden flex-1 bg-gray-200 p-3 rounded">
Ulang
</button>

</div>

<div id="locationInfo" class="text-sm text-gray-500 mt-3">
Mengambil GPS...
</div>

<button onclick="submitAbsensi()" id="btnSubmitAbsensi" class="w-full bg-blue-700 text-white p-4 rounded-xl mt-4">
Kirim Absensi
</button>

</div>

<!-- ADMIN -->

<div id="page-admin" class="page mt-5">

<input id="adminPass" type="password" placeholder="Password Admin" class="border p-3 w-full rounded">

<button onclick="adminLogin()" class="bg-blue-700 text-white w-full p-3 rounded mt-2">
Login
</button>

<div id="adminPanel" class="hidden mt-5">

<button onclick="downloadCSV()" class="bg-green-600 text-white px-3 py-2 rounded text-sm">
Download CSV
</button>

<table class="w-full mt-4 text-sm">

<thead class="bg-blue-900 text-white">

<tr>
<th class="p-2">Nama</th>
<th class="p-2">Tanggal</th>
<th class="p-2">Jam</th>
<th class="p-2">Status</th>
<th class="p-2">Foto</th>
</tr>

</thead>

<tbody id="adminTableBody"></tbody>

</table>

</div>

</div>

</div>

<script src="config.js"></script>
<script src="employees.js"></script>
<script src="app.js"></script>

</body>
</html>
