<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Absensi WFA - BPBD Trenggalek</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .page { display: none; }
    .page.active { display: block; }
  </style>
</head>
<body class="text-slate-900">
  <div class="max-w-3xl mx-auto p-4 min-h-screen">
    <header class="bg-blue-900 text-white rounded-2xl p-5 flex justify-between items-center shadow-lg mb-6">
      <div>
        <h1 class="font-bold text-xl tracking-tight">⏱️ Absensi WFA</h1>
        <p class="text-xs text-blue-200">BPBD KAB. TRENGGALEK</p>
      </div>
      <div class="flex gap-2">
        <button onclick="showPage('dashboard')" class="bg-white/10 hover:bg-white/20 px-3 py-2 rounded-lg">🏠</button>
        <button onclick="showPage('admin')" class="bg-white/10 hover:bg-white/20 px-3 py-2 rounded-lg">🔐</button>
      </div>
    </header>

    <main id="page-dashboard" class="page active space-y-4">
      <section class="bg-white rounded-2xl p-8 text-center shadow-sm border border-blue-100">
        <div id="today" class="text-sm text-slate-500 font-semibold uppercase tracking-wider">Memuat tanggal...</div>
        <div id="clock" class="text-6xl font-extrabold text-blue-800 mt-2 font-mono tracking-tighter">00:00:00</div>
      </section>

      <section class="bg-white rounded-2xl p-6 shadow-sm border border-blue-100">
        <label for="employee" class="font-bold text-slate-700 block mb-3">👤 Pilih Nama Pegawai</label>
        <select id="employee" class="w-full bg-slate-50 border-2 border-slate-200 rounded-xl p-4 text-lg font-medium focus:border-blue-500 focus:ring-4 focus:ring-blue-100 outline-none">
          <option value="" disabled selected>-- Pilih Nama Anda --</option>
        </select>
      </section>

      <section class="grid grid-cols-2 gap-4">
        <button onclick="startAbsensi('masuk')" class="bg-blue-600 hover:bg-blue-700 text-white font-bold p-8 rounded-2xl transition shadow-blue-200 shadow-xl">
          <span class="text-xl block">✓ MASUK</span>
          <span class="text-xs font-normal opacity-80">Presensi Datang</span>
        </button>
        <button onclick="startAbsensi('pulang')" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold p-8 rounded-2xl transition shadow-emerald-200 shadow-xl">
          <span class="text-xl block">✓ PULANG</span>
          <span class="text-xs font-normal opacity-80">Presensi Selesai</span>
        </button>
      </section>
    </main>

    <main id="page-absen" class="page space-y-4">
      <div class="bg-white rounded-2xl p-4 shadow-sm">
        <button onclick="cancelAbsensi()" class="mb-4 text-slate-500 hover:text-slate-800 font-bold">✕ Batalkan Presensi</button>

        <div class="rounded-xl overflow-hidden bg-black">
          <video id="camera" class="video" autoplay playsinline muted></video>
          <canvas id="canvas" class="hidden"></canvas>
          <img id="photo" class="photo hidden" alt="Foto Presensi">
        </div>

        <div class="mt-4 p-4 bg-blue-50 rounded-xl border border-blue-100">
          <p class="font-bold text-blue-900 text-sm">📍 Lokasi Anda</p>
          <p id="locationText" class="text-blue-700 text-sm italic">Mendeteksi lokasi...</p>
        </div>

        <div class="grid grid-cols-1 gap-3 mt-5">
          <button id="btnCapture" onclick="capturePhoto()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold p-4 rounded-xl">📸 Ambil Foto Presensi</button>
          <div id="postCapture" class="hidden grid grid-cols-2 gap-3">
            <button onclick="retakePhoto()" class="bg-slate-500 hover:bg-slate-600 text-white font-bold p-4 rounded-xl">🔄 Ulang Foto</button>
            <button id="btnSubmit" onclick="submitAbsensi()" class="bg-blue-700 hover:bg-blue-800 text-white font-bold p-4 rounded-xl">✓ Kirim Data</button>
          </div>
        </div>
      </div>
    </main>

    <main id="page-admin" class="page space-y-4">
      <div id="adminLogin" class="bg-white rounded-2xl p-8 shadow-sm text-center border border-slate-200">
        <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">🔐</div>
        <h2 class="text-2xl font-bold text-slate-800 mb-2">Admin Panel</h2>
        <p class="text-slate-500 text-sm mb-6">Masukkan password untuk melihat rekap data.</p>

        <input id="adminPassword" type="password" placeholder="Password Admin" class="border-2 border-slate-200 p-4 w-full rounded-xl focus:border-blue-500 outline-none mb-4 text-center tracking-widest font-bold">
        <button onclick="adminLogin()" class="bg-blue-700 hover:bg-blue-800 text-white w-full p-4 rounded-xl font-bold">Masuk Sekarang</button>
      </div>

      <div id="adminPanel" class="hidden bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
        <div class="flex flex-wrap justify-between items-center gap-4 mb-6">
          <h3 class="text-xl font-bold text-slate-800">📊 Rekap Presensi GitHub</h3>
          <div class="flex gap-2">
            <button onclick="loadAdminTable()" class="bg-blue-100 text-blue-700 px-4 py-2 rounded-lg text-sm font-bold">🔄 Refresh</button>
            <button onclick="exportToCSV()" class="bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm font-bold">📥 Export CSV</button>
          </div>
        </div>

        <div class="overflow-x-auto rounded-xl border border-slate-100">
          <table class="w-full text-left border-collapse text-sm">
            <thead class="bg-slate-50 border-b border-slate-200">
              <tr>
                <th class="p-4 font-bold text-slate-600 text-xs uppercase">Nama</th>
                <th class="p-4 font-bold text-slate-600 text-xs uppercase">Waktu</th>
                <th class="p-4 font-bold text-slate-600 text-xs uppercase">Tipe</th>
                <th class="p-4 font-bold text-slate-600 text-xs uppercase">Status</th>
                <th class="p-4 font-bold text-slate-600 text-xs uppercase text-center">Foto</th>
              </tr>
            </thead>
            <tbody id="adminTableBody"></tbody>
          </table>
        </div>
      </div>
    </main>

    <footer class="mt-8 text-center text-slate-400 text-xs">
      &copy; 2026 BPBD KAB. TRENGGALEK - <span class="font-bold text-blue-400">PUSDALOPS</span>
    </footer>
  </div>

  <script src="config.js"></script>
  <script src="employees.js"></script>
  <script src="app.js"></script>
</body>
</html>
