<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Absensi WFA</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="max-w-3xl mx-auto p-4">

    <header class="bg-blue-900 text-white p-4 rounded-xl flex justify-between items-center shadow-md">
      <div>
        <h1 class="font-bold text-lg">⏱️ Absensi WFA</h1>
        <p class="text-xs text-blue-200">BPBD TRENGGALEK</p>
      </div>
      <div class="space-x-2">
        <button onclick="showPage('dashboard')" class="bg-blue-800 p-2 rounded-lg hover:bg-blue-700 transition">🏠</button>
        <button onclick="showPage('admin')" class="bg-blue-800 p-2 rounded-lg hover:bg-blue-700 transition">🔐</button>
      </div>
    </header>

    <main id="page-dashboard" class="page active mt-6">

      <div class="bg-white p-6 rounded-xl text-center shadow-sm border border-blue-100">
        <div id="today" class="text-gray-500 font-semibold mb-2">Memuat tanggal...</div>
        <div id="clock" class="text-5xl font-bold text-blue-900">00:00:00</div>
      </div>

      <div class="bg-white p-4 rounded-xl mt-6 shadow-sm border border-blue-100">
        <label for="employee" class="block text-sm font-semibold text-gray-700 mb-2">Pilih Nama Pegawai</label>
        <select id="employee" class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></select>
      </div>

      <div class="grid grid-cols-2 gap-4 mt-6">
        <button onclick="startAbsensi('masuk')" class="bg-blue-600 hover:bg-blue-700 transition text-white font-bold p-6 rounded-xl shadow-md text-lg">
          MASUK
        </button>
        <button onclick="startAbsensi('pulang')" class="bg-emerald-600 hover:bg-emerald-700 transition text-white font-bold p-6 rounded-xl shadow-md text-lg">
          PULANG
        </button>
      </div>
    </main>

    <main id="page-absen" class="page mt-6">

      <div class="bg-white p-4 rounded-xl shadow-sm border border-blue-100">
        <div class="flex justify-between items-center mb-4">
          <h2 class="font-bold text-gray-700">Ambil Foto Wajah</h2>
          <button onclick="cancelAbsensi()" class="text-red-500 font-semibold text-sm bg-red-50 px-3 py-1 rounded-lg">❌ Batal</button>
        </div>

        <div class="relative">
          <video id="camera" class="video" autoplay playsinline></video>
          <img id="photo" class="hidden photo">
        </div>
        
        <canvas id="canvas" class="hidden"></canvas>

        <p id="locationText" class="mt-4 text-center text-sm font-medium text-gray-600 bg-gray-50 py-2 rounded-lg border border-gray-200">Mendeteksi lokasi...</p>

        <div class="mt-6">
          <button id="btnCapture" onclick="capturePhoto()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-md transition">
            📸 Ambil Foto
          </button>

          <div id="postCapture" class="hidden flex gap-4">
            <button onclick="retakePhoto()" class="w-1/3 bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-4 rounded-xl transition">
              🔄 Ulang
            </button>
            <button id="btnSubmit" onclick="submitAbsensi()" class="w-2/3 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl shadow-md transition">
              ✈️ Kirim Absen
            </button>
          </div>
        </div>
      </div>
    </main>

    <main id="page-admin" class="page mt-6">
      <div class="bg-white p-6 rounded-xl shadow-sm border border-blue-100 text-center">
        <h2 class="font-bold text-gray-700 mb-4 text-lg">Halaman Admin</h2>
        <input type="password" id="adminPassword" placeholder="Masukkan Password Admin" class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 mb-4">
        <button onclick="adminLogin()" class="w-full bg-blue-900 hover:bg-blue-800 text-white font-bold py-3 rounded-xl transition">
          Login
        </button>
      </div>

      <div class="mt-4 overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <tbody id="adminTableBody">
            </tbody>
        </table>
      </div>
    </main>

  </div>

  <script src="config.js"></script>
  <script src="employees.js"></script>
  <script src="app.js"></script>
</body>
</html>
