<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Absensi WFA</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="max-w-3xl mx-auto p-4">

    <!-- HEADER -->
    <header class="bg-blue-900 text-white p-4 rounded-xl flex justify-between">
      <div>
        <h1 class="font-bold">⏱️ Absensi WFA</h1>
        <p class="text-xs">BPBD TRENGGALEK</p>
      </div>
      <div>
        <button onclick="showPage('dashboard')">🏠</button>
        <button onclick="showPage('admin')">🔐</button>
      </div>
    </header>

    <!-- DASHBOARD -->
    <main id="page-dashboard" class="page active mt-4">

      <div class="bg-white p-6 rounded-xl text-center">
        <div id="today">Memuat...</div>
        <div id="clock" class="text-4xl font-bold">00:00:00</div>
      </div>

      <div class="bg-white p-4 rounded-xl mt-4">
        <select id="employee" class="w-full p-3 border rounded-lg"></select>
      </div>

      <div class="grid grid-cols-2 gap-4 mt-4">
        <button onclick="startAbsensi('masuk')" class="bg-blue-600 text-white p-6 rounded-xl">
          MASUK
        </button>
        <button onclick="startAbsensi('pulang')" class="bg-green-600 text-white p-6 rounded-xl">
          PULANG
        </button>
      </div>
    </main>

    <!-- ABSEN -->
    <main id="page-absen" class="page mt-4">

      <button onclick="cancelAbsensi()">❌ Batal</button>

      <video id="camera" class="video" autoplay></video>
      <canvas id="canvas" class="hidden"></canvas>
      <img id="photo" class="hidden photo">

      <p id="locationText">Mendeteksi lokasi...</p>

      <button id="btnCapture" onclick="capturePhoto()">📸 Foto</button>

      <div id="postCapture" class="hidden">
        <button onclick="retakePhoto()">Ulang</button>
        <button id="btnSubmit" onclick="submitAbsensi()">Kirim</button>
      </div>
    </main>

    <!-- ADMIN -->
    <main id="page-admin" class="page mt-4">
      <input id="adminPassword" placeholder="Password">
      <button onclick="adminLogin()">Login</button>

      <table>
        <tbody id="adminTableBody"></tbody>
      </table>
    </main>

  </div>

  <script src="config.js"></script>
  <script src="employees.js"></script>
  <script src="app.js"></script>
</body>
</html>
