<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Absensi WFA BPBD</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Plus Jakarta Sans',sans-serif;
background:linear-gradient(135deg,#1e3a5f,#2563eb);
}

.glass{
background:rgba(255,255,255,0.9);
backdrop-filter:blur(20px);
}

</style>

</head>

<body class="min-h-screen flex items-center justify-center p-4">

<div class="max-w-md w-full space-y-4">

<div class="glass p-6 rounded-2xl text-center">

<h1 class="text-xl font-bold text-blue-900">
Absensi WFA
</h1>

<p class="text-sm text-gray-500">
BPBD KAB. TRENGGALEK
</p>

<div class="mt-4 text-3xl font-bold text-blue-900" id="jam"></div>

<div class="text-sm text-gray-500" id="tanggal"></div>

</div>

<div class="glass p-5 rounded-2xl">

<select id="nama" class="w-full border p-3 rounded-lg">

<option value="">-- Pilih Nama --</option>

<option>Drs.STEFANUS TRIADI ATMONO, M.Si.</option>
<option>Drs. AGUNG WIDODO</option>
<option>DWIANA HANDAYANI,SE</option>
<option>EDY PURWANTO, SE</option>
<option>Bakti Dwi Prasetyo, S.T., M.T.</option>
<option>SUDARSONO</option>
<option>ANIKMATUL KHOIRIYAH, S.M.</option>
<option>RENY YANTI, S.Pd</option>
<option>RIZAL RIZKIANTO, A.Md</option>
<option>SUJANTORO</option>
<option>WAWAN PURWANTO</option>

</select>

</div>

<div class="grid grid-cols-2 gap-3">

<button onclick="absen('masuk')" class="bg-emerald-500 text-white p-4 rounded-xl font-semibold">
Absen Masuk
</button>

<button onclick="absen('pulang')" class="bg-indigo-500 text-white p-4 rounded-xl font-semibold">
Absen Pulang
</button>

</div>

<div class="glass p-4 rounded-xl text-sm">

<div id="gps">Mendeteksi lokasi...</div>

</div>

<div class="glass p-4 rounded-xl">

<video id="video" autoplay playsinline class="rounded-xl"></video>

<canvas id="canvas" class="hidden"></canvas>

</div>

<button onclick="loginAdmin()" class="text-white text-sm underline">
Admin
</button>

</div>

<script>

let githubToken=""
let gistId=""

let gps={}

function jamRealtime(){

let now=new Date()

document.getElementById("jam").innerText=
now.toLocaleTimeString("id-ID",{timeZone:"Asia/Jakarta"})

document.getElementById("tanggal").innerText=
now.toLocaleDateString("id-ID",{timeZone:"Asia/Jakarta"})

}

setInterval(jamRealtime,1000)

navigator.geolocation.getCurrentPosition(async pos=>{

gps.lat=pos.coords.latitude
gps.lng=pos.coords.longitude

let res=await fetch(
`https://nominatim.openstreetmap.org/reverse?format=json&lat=${gps.lat}&lon=${gps.lng}`
)

let data=await res.json()

gps.alamat=data.display_name

document.getElementById("gps").innerText="📍 "+gps.alamat

})

navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
document.getElementById("video").srcObject=stream
})

function ambilFoto(){

let video=document.getElementById("video")
let canvas=document.getElementById("canvas")

canvas.width=video.videoWidth
canvas.height=video.videoHeight

canvas.getContext("2d").drawImage(video,0,0)

return canvas.toDataURL("image/jpeg",0.7)

}

async function loadData(){

let res=await fetch(
`https://api.github.com/gists/${gistId}`,
{headers:{Authorization:`token ${githubToken}`}}
)

let gist=await res.json()

let content=gist.files["absensi-data.json"].content

let json=JSON.parse(content)

return json.data||[]

}

async function saveData(records){

let body={
files:{
"absensi-data.json":{
content:JSON.stringify({
last_sync:new Date().toISOString(),
data:records
},null,2)
}
}
}

await fetch(
`https://api.github.com/gists/${gistId}`,
{
method:"PATCH",
headers:{
Authorization:`token ${githubToken}`,
"Content-Type":"application/json"
},
body:JSON.stringify(body)
}
)

}

async function absen(type){

let nama=document.getElementById("nama").value

if(!nama){

alert("Pilih nama dulu")

return

}

let data=await loadData()

let today=new Date().toISOString().slice(0,10)

let duplikat=data.find(r=>
r.nama===nama &&
r.tanggal===today &&
r.tipe===type
)

if(duplikat){

alert("Sudah absen hari ini")

return

}

let foto=ambilFoto()

let record={

__backendId:Date.now().toString(),

nama:nama,

tanggal:today,

jam:new Date().toLocaleTimeString("id-ID"),

tipe:type,

latitude:gps.lat,

longitude:gps.lng,

alamat:gps.alamat,

foto:foto

}

data.push(record)

await saveData(data)

alert("Absensi berhasil")

}

function loginAdmin(){

let user=prompt("Username")

let pass=prompt("Password")

if(user==="admin" && pass==="12345"){

lihatData()

}

else{

alert("Login gagal")

}

}

async function lihatData(){

let data=await loadData()

let text="DATA ABSENSI\n\n"

data.forEach(d=>{

text+=
d.nama+" | "+
d.tanggal+" "+
d.jam+" | "+
d.tipe+"\n"

})

alert(text)

}

</script>

</body>
</html>
